# ============================================
#  错题猎人 (Mistake Hunter) — Docker 开发环境
#  使用：docker compose up
#  然后打开：http://localhost:5173
# ============================================

services:
  # ---- 后端 API 服务 ----
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mistake-hunter-server
    ports:
      - "3001:3001"
    volumes:
      # 代码目录挂载 → 修改代码自动热重载
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      # 数据持久化（不随容器删除而丢失）
      - server-data:/app/prisma
      - uploads-data:/app/uploads
    environment:
      - PORT=3001
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - JWT_EXPIRES_IN=2h
      - JWT_REFRESH_EXPIRES_IN=7d
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_API_KEY=${AI_API_KEY:-your-api-key}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - CORS_ORIGINS=http://localhost:5173
      - UPLOAD_DIR=./uploads
      - MAX_FILE_SIZE=10485760
    restart: unless-stopped

  # ---- 前端开发服务器 ----
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mistake-hunter-client
    ports:
      - "5173:5173"
    volumes:
      # 代码目录挂载 → 修改代码自动热重载
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
      - ./client/vite.config.ts:/app/vite.config.ts
      - ./client/tailwind.config.js:/app/tailwind.config.js
      - ./client/postcss.config.js:/app/postcss.config.js
    environment:
      # 让 Vite 代理指向 Docker 网络里的后端容器
      - VITE_API_TARGET=http://server:3001
    depends_on:
      - server
    restart: unless-stopped

volumes:
  server-data:    # SQLite 数据库文件持久化
  uploads-data:   # 上传的图片文件持久化
